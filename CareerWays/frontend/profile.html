<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - CareerWays</title>
    <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <div class="profile-page-container">
        <header class="profile-header">
            <div class="header-left">
                <button id="backBtn" class="btn btn-secondary">Back</button>
                <h1>Profile Settings</h1>
            </div>
            <div class="header-right">
                <span id="userNameDisplay" class="user-name"></span>
                <button id="logoutBtn" class="btn btn-secondary">Log Out</button>
            </div>
        </header>

        <main class="profile-main">
            <section class="settings-card">
                <h3>Email & Name</h3>
                <form id="profileForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Profile</button>
                </form>
            </section>

            <section class="settings-card">
                <h3>Reset Password</h3>
                <form id="passwordForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="oldPassword">Current Password</label>
                            <input type="password" id="oldPassword" required>
                        </div>
                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm New Password</label>
                            <input type="password" id="confirmPassword" required minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </form>
            </section>

            <section class="settings-card danger-card">
                <h3>Delete Account</h3>
                <p>This permanently deletes your account and saved data.</p>
                <form id="deleteForm">
                    <div class="form-group">
                        <label for="deletePassword">Confirm Password</label>
                        <input type="password" id="deletePassword" required>
                    </div>
                    <button type="submit" class="btn btn-danger">Delete Account</button>
                </form>
            </section>
        </main>
    </div>

    <div id="notification" class="notification"></div>

    <script src="js/profile.js"></script>
</body>

</html>
