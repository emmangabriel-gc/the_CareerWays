<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - CareerWays</title>
    <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/profile.css">

    <!--PWA-->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff3b30">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CareerWays">
    <link rel="apple-touch-icon" href="assets/web-app-manifest-192x192.png">
</head>


<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }
</script>


<body>

    <header class="header">
        <button class="back-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24">
                <polyline points="15 18 9 12 15 6" />
            </svg>
        </button>
        <h1 class="header-title">Profile Settings</h1>
    </header>

    <main class="main">

        <!-- Profile -->
        <section class="section">
            <h2 class="section-heading">Profile</h2>
            <div class="card">
                <div class="profile-field">
                    <div class="field-label">Name</div>
                    <div class="field-value" id="profileName">—</div>
                </div>
                <div class="divider"></div>
                <div class="profile-field">
                    <div class="field-label">Email</div>
                    <div class="field-value" id="profileEmail">—</div>
                </div>
            </div>
        </section>

        <!-- Password -->
        <section class="section">
            <h2 class="section-heading">Password</h2>
            <div class="card password-card">
                <div class="pw-info">
                    <div class="pw-title">Reset Password</div>
                    <div class="pw-desc">Forgot Password? We'll be logging you out to proceed with this function</div>
                </div>
                <button class="reset-btn" id="resetPasswordBtn">Reset Password</button>
            </div>
        </section>

    </main>

    <!-- Log Out -->
    <div class="logout-bar">
        <button class="logout-btn" id="logoutBtn">Log Out</button>
    </div>

    <div id="notification" class="notification"></div>

    <script src="js/api-config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
